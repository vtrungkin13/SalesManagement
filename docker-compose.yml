services:

  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sqlserver

    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "Trungkien132@"

    ports:
      - "1433:1433"

    volumes:
      - sql-data:/var/opt/mssql

    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P "Trungkien132@" -C -Q "SELECT 1"
      interval: 10s
      timeout: 5s
      retries: 10



  app:
    image: sales-management
    container_name: sales-app

    ports:
      - "8080:8080"

    depends_on:
      sqlserver:
        condition: service_healthy


volumes:
  sql-data: